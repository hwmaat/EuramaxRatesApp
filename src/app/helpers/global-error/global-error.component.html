@if (error$ | async; as error) {
  <div
    class="error-panel"
    [ngClass]="error.severity">
    <div class="error-header">
      <div class="title">
        <i [class]="iconClass(error.severity)"></i>
        <strong>{{ error.title }}</strong>
      </div>
      <dx-button
        icon="close"
        stylingMode="text"
        (onClick)="close()">
      </dx-button>
    </div>
    <div class="error-message">
      {{ error.message }}
    </div>
  </div>
}
