<div class="em-container">
	<dx-toolbar class="ams-toolbar">
		<dxi-item location="before">
			<div class="toolbar-title"></div>
		</dxi-item>
	</dx-toolbar>

	<dx-data-grid
		#gridContainer
		id="gridContainer"
		[dataSource]="records"
		keyExpr="id"
		[focusedRowEnabled]="true"
		[hoverStateEnabled]="true"
		(onCellHoverChanged)="onCellHoverChanged($event)"
		(onExporting)="onExporting($event, 'ProductionLines')"
		(onToolbarPreparing)="onToolbarPreparing($event)"
		(onEditingStart)="onEditingStart($event)"
		(onInitNewRow)="onInitNewRow($event)"
		(onRowUpdating)="rowUpdating($event)"
		(onRowInserting)="rowInserting($event)"
		(onRowRemoving)="onRowRemoving($event)"
		(onRowInserted)="onRowInserted($event)"
		(onSelectionChanged)="onSelectionChanged($event)"
		(onEditCanceled)="ResetEdit()"
		[cellHintEnabled]="true"
	>
		<dxo-scrolling rowRenderingMode="virtual"></dxo-scrolling>
		<dxo-selection [mode]="selectionMode" showCheckBoxesMode="onClick" selectAllMode="page" allowSelectAll="true"></dxo-selection>
		<dxo-editing
			[mode]="editingMode"
			[allowUpdating]="true"
			[allowDeleting]="false"
			[allowAdding]="true"
			[useIcons]="false"
			[confirmDelete]="false"
		>
			<dxo-popup [title]="'Add Production Line'" [showTitle]="true" [width]="600" [height]="420"></dxo-popup>
			<dxo-form [showValidationSummary]="true">
				<dxi-item dataField="code"></dxi-item>
				<dxi-item dataField="name"></dxi-item>
				<dxi-item dataField="maxSpeed"></dxi-item>
				<dxi-item dataField="maxOvenTemp"></dxi-item>
			</dxo-form>
		</dxo-editing>
		<dxo-paging [enabled]="true" [pageSize]="pageSize"></dxo-paging>
		<dxo-pager
			[visible]="true"
			[showPageSizeSelector]="true"
			[showInfo]="true"
			[showNavigationButtons]="true"
			[allowedPageSizes]="[5, 10, 15, 20, 25, 100]"
			[displayMode]="'full'"
		></dxo-pager>

		<dxi-column type="buttons" [visible]="false"></dxi-column>
		<dxi-column caption="action" [width]="125" cellTemplate="buttonrowtemplate" [fixed]="true" fixedPosition="left"></dxi-column>
		<dxi-column dataField="id" caption="id#" [width]="75" [allowEditing]="false"></dxi-column>
		<dxi-column dataField="code" caption="code" [width]="120">
			<dxi-validation-rule type="required" message="Code is required"></dxi-validation-rule>
			<dxi-validation-rule type="stringLength" [max]="100" message="Code cannot exceed 100 characters"></dxi-validation-rule>
		</dxi-column>
		<dxi-column dataField="name" caption="description" [width]="220">
			<dxi-validation-rule type="stringLength" [max]="100" message="Description cannot exceed 100 characters"></dxi-validation-rule>
		</dxi-column>
		<dxi-column dataField="maxSpeed" caption="maxSpeed" [width]="110" dataType="number" [format]="fixedformat0" alignment="right">
			<dxi-validation-rule type="range" [min]="1" [max]="100" message="MaxSpeed must be between 1 and 100"></dxi-validation-rule>
		</dxi-column>
		<dxi-column dataField="maxOvenTemp" caption="maxOvenTemp" [width]="130" dataType="number" [format]="fixedformat0" alignment="right">
			<dxi-validation-rule type="required" message="MaxOvenTemp is required"></dxi-validation-rule>
			<dxi-validation-rule type="range" [min]="1" [max]="500" message="MaxOvenTemp must be between 1 and 500"></dxi-validation-rule>
		</dxi-column>
		<dxi-column dataField="created" caption="created" [width]="170" dataType="datetime" format="dd/MM/yyyy HH:mm" [allowEditing]="false"></dxi-column>
		<dxi-column dataField="updated" caption="updated" [width]="170" dataType="datetime" format="dd/MM/yyyy HH:mm" [allowEditing]="false"></dxi-column>
		<dxi-column dataField="" width="100%" caption=""></dxi-column>

		<div *dxTemplate="let data of 'buttonrowtemplate'">
			@if (hoverIndex == getRowIndex(data) || data.row.isEditing ) {
				<div class="button-column">
					<dx-button icon="edit" hint="edit production line" stylingMode="text" (onClick)="EditRecord(data)" class="small-icon" [visible]="!(data.row.isEditing)"></dx-button>
					<dx-button icon="trash" hint="delete record" stylingMode="text" (onClick)="DeleteRecord(data)" class="small-icon" [visible]="!(data.row.isEditing)"></dx-button>
					<dx-button icon="revert" stylingMode="text" (onClick)="CancelEdit(data)" class="small-icon" [visible]="data.row.isEditing"></dx-button>
					<dx-button icon="save" stylingMode="text" (onClick)="SaveRecord(data)" class="small-icon" [visible]="data.row.isEditing"></dx-button>
				</div>
			}
		</div>

		<dxo-summary>
			<dxi-group-item summaryType="count" displayFormat="{0}" [showInGroupFooter]="false"></dxi-group-item>
		</dxo-summary>
	</dx-data-grid>
</div>
