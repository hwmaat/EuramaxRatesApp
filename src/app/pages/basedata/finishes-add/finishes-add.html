<dx-popup
  [visible]="visible()"
  [showTitle]="true"
  title="Add Finish"
  [width]="1100"
  [height]="'70vh'"
  [dragEnabled]="true"
  [showCloseButton]="true"
  [hideOnOutsideClick]="false"
  [resizeEnabled]="true"
  (onHiding)="onCancel()"
>
  <div *dxTemplate="let _ of 'content'" class="finishes-add-content">
    <dx-form
      [formData]="model"
      [colCount]="1"
      [labelLocation]="'left'"
      [showColonAfterLabel]="false"
      class="finishes-add-form"
    >
      <dxi-item itemType="group" [colCount]="3" caption="Finish">
        <dxi-item dataField="finishCode" [isRequired]="true" [label]="{ text: 'Finish Code' }"></dxi-item>
        <dxi-item dataField="paintLine" [isRequired]="true" editorType="dxSelectBox" [editorOptions]="{ items: paintLineOptions, searchEnabled: true, showClearButton: true }" [label]="{ text: 'Paint Line' }"></dxi-item>
        <dxi-item dataField="state" [isRequired]="true" editorType="dxSelectBox" [editorOptions]="{ items: stateOptions }" [label]="{ text: 'State' }"></dxi-item>

        <dxi-item dataField="customerNumber" [label]="{ text: 'Customer Number' }"></dxi-item>
        <dxi-item dataField="substrate" [isRequired]="true" editorType="dxSelectBox" [editorOptions]="{ items: substrateOptions, searchEnabled: true, showClearButton: true }" [label]="{ text: 'Substrate' }"></dxi-item>
        <dxi-item dataField="preTreatment" [isRequired]="true" [label]="{ text: 'Pre Treatment' }"></dxi-item>

        <dxi-item dataField="surfaceTreatment" [label]="{ text: 'Surface Treatment' }"></dxi-item>
        <dxi-item dataField="surfaceQuality" [label]="{ text: 'Surface Quality' }"></dxi-item>
        <dxi-item dataField="runs" [isRequired]="true" [label]="{ text: 'Runs' }"></dxi-item>

        <dxi-item dataField="side" [isRequired]="true" editorType="dxSelectBox" [editorOptions]="{ items: sideOptions }" [label]="{ text: 'Side' }"></dxi-item>
        <dxi-item dataField="maxSpeedRun1" [label]="{ text: 'Max Speed Run 1' }"></dxi-item>
        <dxi-item dataField="maxSpeedRun2" [label]="{ text: 'Max Speed Run 2' }"></dxi-item>
        <dxi-item dataField="maxSpeedRun3" [label]="{ text: 'Max Speed Run 3' }"></dxi-item>
      </dxi-item>
    </dx-form>

    <div class="paintlayers-grid-host">
      <dx-data-grid
        class="paintlayers-grid"
        [dataSource]="model.paintLayers"
        [height]="'100%'"
        keyExpr="id"
        [showBorders]="true"
        [showColumnLines]="true"
        [hoverStateEnabled]="true"
        [rowAlternationEnabled]="true"
        [paging]="{ enabled: false }"
        (onInitNewRow)="onInitNewLayerRow($event)"
        [groupPanel]='{ visible: false}'
        [searchPanel]='{ visible: false}'
      >
        <dxo-editing mode="row" [allowUpdating]="true" [allowAdding]="true" [allowDeleting]="true" [useIcons]="true"></dxo-editing>
        <dxi-column dataField="id" caption="id#" [width]="75" [allowEditing]="false"></dxi-column>
        <dxi-column dataField="layerNumber" caption="Layer" [width]="120" dataType="number" alignment="right"></dxi-column>
        <dxi-column dataField="paintCode" caption="Paint Code" [width]="220" editCellTemplate="paintCodeEditTemplate"></dxi-column>
        <dxi-column dataField="layerThickness" caption="Thickness" [width]="140" dataType="number" alignment="right"></dxi-column>
        <dxi-column  width="100%"></dxi-column>

        <div *dxTemplate="let cell of 'paintCodeEditTemplate'">
          <div class="paint-code-editor">
            <dx-text-box
              [value]="cell.value"
              (onValueChanged)="cell.setValue($event.value ?? '')">
            </dx-text-box>
            <dx-button
              icon="search"
              hint="Select paint"
              stylingMode="outlined"
              (onClick)="openPaintSelector(cell)">
            </dx-button>
          </div>
        </div>
      </dx-data-grid>
    </div>

    <div class="finishes-add-footer">
      <dx-button icon="save" text="Save" stylingMode="outlined" (onClick)="onSave()" [disabled]="loading"></dx-button>
      <dx-button icon="close" text="Cancel" stylingMode="outlined" (onClick)="onCancel()" [disabled]="loading"></dx-button>
    </div>

  </div>
</dx-popup>

<paintselected
  [visible]="isPaintSelectorVisible"
  (selected)="onPaintSelected($event)"
  (closed)="onPaintSelectorClosed()">
</paintselected>
